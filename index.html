            for (let p of players) {
                if (!p.isActive || p.scale <= 0) continue;
                let curSkin = p.skin;

                for (let i = 0; i < p.trail.length; i++) {
                    let pt = p.trail[i]; ctx.save(); ctx.translate(pt.x + p.width/2, pt.y + p.height/2); ctx.rotate(pt.rotation);
                    if (pt.lean) { ctx.translate(0, p.height/2); ctx.transform(1, 0, -pt.lean, 1, 0, 0); ctx.translate(0, -p.height/2); }
                    let trailScale = (1 - (i / 5) * 0.5) * p.scale; ctx.scale(trailScale, trailScale);
                    ctx.globalAlpha = (1 - (i / 5)) * 0.5; 
                    ctx.shadowBlur = 8; ctx.shadowColor = curSkin.glow || curSkin.color; 
                    ctx.fillStyle = curSkin.glow || curSkin.color; ctx.fillRect(-p.width/2, -p.height/2, p.width, p.height); ctx.restore();
                }
                ctx.globalAlpha = 1; ctx.save(); ctx.translate(p.x + p.width/2, p.y + p.height/2); 
                
                let visualRotation = p.rotation; 
                let currentLean = p.lean;
                if (p.touchingWall !== 0 && !p.isGrounded && p.vy > 0) { visualRotation = 0; currentLean = 0; }
                
                ctx.rotate(visualRotation); 
                if (currentLean !== 0) { ctx.translate(0, p.height/2); ctx.transform(1, 0, -currentLean, 1, 0, 0); ctx.translate(0, -p.height/2); }
                if (p.scale !== 1) ctx.scale(p.scale, p.scale);

                let jumpSquashY = p.isGrounded ? 0 : Math.min(Math.abs(p.vy) * 0.3, 4); let jumpSquashX = -jumpSquashY * 0.5;
                let runStretchX = p.runStretchX; let runStretchY = -runStretchX * 0.5;
                
                let phaseOffset = (gameMode === 'RACE' && p.id === 2) ? Math.PI : 0;
                let idleSquashY = Math.sin(Date.now() / 250 + phaseOffset) * 1.5 * p.idleBlend; let idleSquashX = -idleSquashY * 0.5;
                
                let hardLandSquashX = (p.hardLandTimer / 10) * 8; let hardLandSquashY = -(p.hardLandTimer / 10) * 8;
                let wallSquashX = (p.touchingWall !== 0 && !p.isGrounded && p.vy > 0) ? -4 : 0; let wallSquashY = (p.touchingWall !== 0 && !p.isGrounded && p.vy > 0) ? 6 : 0;

                let squashX = jumpSquashX + runStretchX + idleSquashX + hardLandSquashX + wallSquashX; 
                let squashY = jumpSquashY + runStretchY + idleSquashY + hardLandSquashY + wallSquashY;
                
                ctx.shadowBlur = 8; ctx.shadowColor = curSkin.glow || curSkin.color; 
                ctx.fillStyle = curSkin.color;
                ctx.fillRect(-p.width/2 - squashX, -p.height/2 - squashY*2, p.width + squashX*2, p.height + squashY*2);
                
                ctx.shadowBlur = 0; ctx.fillStyle = curSkin.eye; 
                let eyeOffsetX = p.facingRight ? 0 : -8; if (p.touchingWall !== 0 && !p.isGrounded && p.vy > 0) eyeOffsetX = p.touchingWall === 1 ? -8 : 0;
                let eyeOffsetY = -8; if (p.vy < -2) eyeOffsetY = -10; else if (p.vy > 5) eyeOffsetY = -4; 
                let eyeHeight = 8; if (p.blinkTimer < 0) { eyeHeight = 2; eyeOffsetY += 3; } else if (p.vy < -2) { eyeHeight = 12; eyeOffsetY -= 4; } 
                
                ctx.fillRect(eyeOffsetX, eyeOffsetY - squashY*2, 4, eyeHeight); 
                ctx.fillRect(eyeOffsetX + 8, eyeOffsetY - squashY*2, 4, eyeHeight);
                
                if (isTwoPlayer) { 
                    ctx.fillStyle = '#fff'; ctx.font = '900 10px "Orbitron"'; ctx.textAlign = 'center'; 
                    if (gameMode === 'COOP' && p.atGoal && !isLevelComplete) {
                        ctx.fillStyle = '#ffcc00'; ctx.fillText("WAITING", 0, -p.height/2 - squashY*2 - 10);
                    } else {
                        ctx.fillText(`P${p.id}`, 0, -p.height/2 - squashY*2 - 10); 
                    }
                }
                ctx.restore();
            }
            ctx.shadowBlur = 0; 
        }

        // --- MENU SCREENS RENDERING ---
        function drawDance() {
            if (!isGameBeaten) return;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isTwoPlayer) return;

            let cx = canvas.width / 2 - 140; let cy = canvas.height / 2 + 50; 
            let move = Math.floor(danceTimer / 10) % 4;

            players.forEach((p, idx) => {
                let curSkin = p.skin; ctx.save();
                let offsetX = isTwoPlayer ? (idx === 0 ? -40 : 40) : 0;
                let pBounce = Math.abs(Math.sin((danceTimer + idx*5) * 0.15)) * 40;
                ctx.translate(cx + offsetX, cy - pBounce); let scale = 3; ctx.scale(scale, scale);
                
                if (move === 1) ctx.scale(-1, 1); else if (move === 2) ctx.scale(1, 0.8); else if (move === 3) ctx.scale(-1, 1);
                
                if (currentStyle === 'RETRO') {
                    ctx.fillStyle = '#fff'; ctx.fillRect(-12, -12, 24, 24); ctx.fillStyle = curSkin.color; ctx.fillRect(-8, -8, 16, 16);
                } else {
                    ctx.shadowBlur = 10; ctx.shadowColor = curSkin.glow || curSkin.color; ctx.fillStyle = curSkin.color; ctx.fillRect(-12, -12, 24, 24); ctx.shadowBlur = 0;
                }
                ctx.fillStyle = curSkin.eye; let eyeH = (move===2) ? 4 : 8; ctx.fillRect(-8, -8, 4, eyeH); ctx.fillRect(4, -8, 4, eyeH); 
                
                if (totalDiamonds >= 30) {
                    ctx.save();
                    ctx.translate(14, 2); 
                    if (currentStyle === 'RETRO') {
                        let time = Date.now();
                        let frame = Math.floor(time / 150) % 4;
                        ctx.fillStyle = '#ffcc00';
                        ctx.scale(0.5, 0.5);
                        if (frame === 0 || frame === 2) {
                            ctx.fillRect(-PIXEL, -PIXEL*2, PIXEL*2, PIXEL*4);
                            ctx.fillRect(-PIXEL*2, -PIXEL, PIXEL*4, PIXEL*2);
                            ctx.fillStyle = '#fff'; ctx.fillRect(-PIXEL, -PIXEL, PIXEL, PIXEL);
                        } else {
                            ctx.fillRect(-PIXEL, -PIXEL*2, PIXEL*2, PIXEL*4);
                        }
                    } else {
                        ctx.scale(Math.cos(Date.now() / 300), 1);
                        ctx.fillStyle = '#ffcc00';
                        ctx.shadowBlur = 5; ctx.shadowColor = '#ffcc00';
                        ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(5, 0); ctx.lineTo(0, 6); ctx.lineTo(-5, 0); ctx.closePath(); ctx.fill();
                        ctx.shadowBlur = 0; ctx.fillStyle = '#fff';
                        ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(2, 0); ctx.lineTo(0, 3); ctx.lineTo(-2, 0); ctx.closePath(); ctx.fill();
                    }
                    ctx.restore();
                }
                ctx.restore();
            });
        }

        function drawSkinsPreview() {
            ctx.fillStyle = 'rgba(15, 15, 19, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            let cy = canvas.height / 2 - 80; 
            let bounce1 = Math.abs(Math.sin(Date.now() / 300)) * 15;
            let bounce2 = Math.abs(Math.sin(Date.now() / 300 + Math.PI)) * 15;
            let scale = 4; 

            let wrapperWidth = Math.min(canvas.width, 800) - 40; 
            let offset = wrapperWidth / 4;
            
            // Shift the whole character slightly left to optically balance the right-facing eyes
            let opticalOffset = 3; 

            // Draw Player 1 Preview
            ctx.save(); ctx.translate(canvas.width / 2 - offset - opticalOffset, cy - bounce1); ctx.scale(scale, scale); 
            let p1Skin = skins[p1SkinIndex];
            if (currentStyle === 'RETRO') {
                ctx.fillStyle = '#fff'; ctx.fillRect(-12, -12, 24, 24); ctx.fillStyle = p1Skin.color; ctx.fillRect(-8, -8, 16, 16);
                ctx.fillStyle = p1Skin.eye; ctx.fillRect(0, -8, 4, 8); ctx.fillRect(8, -8, 4, 8);
            } else {
                ctx.shadowBlur = 10; ctx.shadowColor = p1Skin.glow || p1Skin.color; ctx.fillStyle = p1Skin.color; ctx.fillRect(-12, -12, 24, 24); ctx.shadowBlur = 0;
                ctx.fillStyle = p1Skin.eye; ctx.fillRect(0, -8, 4, 8); ctx.fillRect(8, -8, 4, 8);
            }
            ctx.restore();

            // Draw Player 2 Preview
            ctx.save(); ctx.translate(canvas.width / 2 + offset - opticalOffset, cy - bounce2); ctx.scale(scale, scale); 
            let p2Skin = skins[p2SkinIndex];
            if (currentStyle === 'RETRO') {
                ctx.fillStyle = '#fff'; ctx.fillRect(-12, -12, 24, 24); ctx.fillStyle = p2Skin.color; ctx.fillRect(-8, -8, 16, 16);
                ctx.fillStyle = p2Skin.eye; ctx.fillRect(0, -8, 4, 8); ctx.fillRect(8, -8, 4, 8);
            } else {
                ctx.shadowBlur = 10; ctx.shadowColor = p2Skin.glow || p2Skin.color; ctx.fillStyle = p2Skin.color; ctx.fillRect(-12, -12, 24, 24); ctx.shadowBlur = 0;
                ctx.fillStyle = p2Skin.eye; ctx.fillRect(0, -8, 4, 8); ctx.fillRect(8, -8, 4, 8);
            }
            ctx.restore();
        }

        function draw() {
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save(); ctx.scale(currentZoom, currentZoom); drawParallaxBG(ctx, currentTheme, cameraX, cameraY); ctx.restore();
            ctx.save(); ctx.scale(currentZoom, currentZoom);
            
            if (currentStyle === 'MODERN') drawForeground(ctx, currentTheme, cameraX, cameraY);

            if (currentStyle === 'RETRO') { ctx.translate(-Math.floor(cameraX), -Math.floor(cameraY)); drawRetro(); } 
            else { ctx.translate(-cameraX, -cameraY); drawModern(); }
            ctx.restore();

            if (gameState === 'SKINS') drawSkinsPreview();
            if (victoryPhase === 2) drawDance();
        }

        let lastTime = 0; const STEP = 1000 / 60; let accumulator = 0;
        function gameLoop(currentTime) {
            if (!lastTime) lastTime = currentTime; let dt = currentTime - lastTime; lastTime = currentTime;
            if (dt > 100) dt = 100; 
            accumulator += dt;
            while (accumulator >= STEP) { updatePhysics(); accumulator -= STEP; }
            draw(); requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', (e) => { 
            if (e.repeat) return; 
            if (e.code === 'Escape' || e.code === 'KeyP') {
                if (gameState === 'PLAYING' || gameState === 'INTRO' || gameState === 'PAUSED') togglePause();
            }
            const mapping = isTwoPlayer ? { KeyA: 'p1_left', KeyD: 'p1_right', KeyW: 'p1_up', ArrowLeft: 'p2_left', ArrowRight: 'p2_right', ArrowUp: 'p2_up' } : { KeyA: 'p1_left', ArrowLeft: 'p1_left', KeyD: 'p1_right', ArrowRight: 'p1_right', KeyW: 'p1_up', ArrowUp: 'p1_up', Space: 'p1_up' };
            if (mapping[e.code]) { keys[mapping[e.code]] = true; if (e.code.includes('Up') || e.code === 'Space') e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => { 
            const mapping = isTwoPlayer ? { KeyA: 'p1_left', KeyD: 'p1_right', KeyW: 'p1_up', ArrowLeft: 'p2_left', ArrowRight: 'p2_right', ArrowUp: 'p2_up' } : { KeyA: 'p1_left', ArrowLeft: 'p1_left', KeyD: 'p1_right', ArrowRight: 'p1_right', KeyW: 'p1_up', ArrowUp: 'p1_up', Space: 'p1_up' };
            if (mapping[e.code]) keys[mapping[e.code]] = false;
        });

        const bindTouch = (elem, key) => { 
            if (!elem) return;
            elem.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if (!keys[key]) { 
                    keys[key] = true; 
                    elem.classList.add('active'); 
                }
            }, {passive: false}); 
            elem.addEventListener('touchend', (e) => { 
                e.preventDefault(); 
                keys[key] = false; 
                elem.classList.remove('active'); 
            }, {passive: false}); 
            elem.addEventListener('touchcancel', (e) => { 
                e.preventDefault(); 
                keys[key] = false; 
                elem.classList.remove('active'); 
            }, {passive: false}); 
        };
        
        // P1 Controls
        bindTouch(document.getElementById('btn-left'), 'p1_left'); 
        bindTouch(document.getElementById('btn-right'), 'p1_right'); 
        bindTouch(document.getElementById('btn-jump'), 'p1_up');
        
        // P2 Controls
        bindTouch(document.getElementById('btn-left-p2'), 'p2_left'); 
        bindTouch(document.getElementById('btn-right-p2'), 'p2_right'); 
        bindTouch(document.getElementById('btn-jump-p2'), 'p2_up');
        
        window.oncontextmenu = function(event) { event.preventDefault(); event.stopPropagation(); return false; };

        loadLevel('MENU');
        requestAnimationFrame((time) => { lastTime = time; requestAnimationFrame(gameLoop); });
    </script>
</body>
</html>
