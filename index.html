<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Jumper</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Press+Start+2P&display=swap');

        :root {
            --bg-color: #0f0f13;
            --canvas-bg: #1a1a24;
            --primary: #00f0ff;
            --danger: #ff0055;
            --success: #00ffaa;
            --text-color: #ffffff;
            --platform: #38384f;
            --p1-color: #00f0ff;
            --p2-color: #ff00ff;
            --p1-skin-color: #00f0ff;
            --p2-skin-color: #ff00ff;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; touch-action: none; 
        }

        body.retro-style { font-family: 'Press Start 2P', monospace; }
        body.retro-style #ui-layer, body.retro-style #timer-text, body.retro-style #race-deaths-text { font-size: 14px; letter-spacing: 0; }
        body.retro-style .btn { font-weight: normal; letter-spacing: 0; }
        body.retro-style #game-container, body.retro-style canvas { image-rendering: pixelated; }
        
        #game-container {
            position: relative; background-color: var(--canvas-bg); 
            width: 100vw; height: 100vh;
            image-rendering: auto; 
        }

        canvas { display: block; width: 100%; height: 100%; image-rendering: inherit; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            box-sizing: border-box; display: flex; justify-content: space-between;
            pointer-events: none; font-size: 18px; font-weight: 900;
            letter-spacing: 2px; color: #fff; text-shadow: 3px 3px 0px #000; z-index: 5;
        }

        #diamonds-text {
            font-size: 16px; font-weight: 900; color: #ffcc00; text-shadow: 2px 2px 0px #000;
            margin-top: 8px; letter-spacing: 4px;
        }

        #timer-text {
            font-size: 16px; font-weight: 900; color: #fff; text-shadow: 3px 3px 0px #000;
            pointer-events: none; z-index: 5; margin-top: 8px; text-align: right;
        }

        #race-deaths-text {
            font-size: 14px; font-weight: 900; text-shadow: 2px 2px 0px #000;
            pointer-events: none; z-index: 5; margin-top: 8px; text-align: right; line-height: 1.5; display: none;
        }

        #main-menu, #message-overlay, #skins-menu, #mode-menu, #pause-menu, #two-player-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; opacity: 0; pointer-events: none;
            transition: opacity 0.2s steps(4); z-index: 10;
        }

        #main-menu, #mode-menu, #two-player-menu { background: rgba(15, 15, 19, 0.85); }
        #skins-menu { background: transparent; }
        #message-overlay, #pause-menu { background: rgba(0, 0, 0, 0.85); }
        #main-menu.visible, #message-overlay.visible, #skins-menu.visible, #mode-menu.visible, #pause-menu.visible, #two-player-menu.visible { opacity: 1; pointer-events: auto; }

        #studio-intro {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050508; z-index: 45; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
        #studio-text-1 {
            font-size: 16px; color: #fff; opacity: 0; transition: opacity 1s; letter-spacing: 4px; margin-bottom: 10px;
        }
        #studio-text-2 {
            font-size: 40px; color: var(--primary); text-shadow: 4px 4px 0px #005555;
            opacity: 0; transform: scale(0.5); transition: opacity 0.5s, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 900; letter-spacing: 6px;
        }
        @media (min-width: 800px) {
            #studio-text-1 { font-size: 24px; }
            #studio-text-2 { font-size: 64px; }
        }

        #pause-btn {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            font-size: 16px; font-weight: 900; color: var(--primary); cursor: pointer;
            z-index: 8; display: none; padding: 10px 20px; background-color: #000;
            border: 4px solid var(--primary); border-radius: 0; user-select: none;
            touch-action: manipulation; letter-spacing: 2px;
            box-shadow: 4px 4px 0px var(--primary); transition: all 0.1s;
        }
        #pause-btn:hover { 
            background-color: var(--primary); color: #000; 
            transform: translateX(-50%) translate(-2px, -2px); 
            box-shadow: 6px 6px 0px #fff; 
        }
        #pause-btn:active { 
            transform: translateX(-50%) translate(2px, 2px); 
            box-shadow: 2px 2px 0px #fff; 
        }
        .retro-style #pause-btn { border-radius: 0; font-family: 'Press Start 2P', monospace; font-size: 12px; }

        #sound-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #000000; z-index: 50; cursor: pointer; transition: opacity 0.3s;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #sound-overlay .menu-title { animation: pulse 1.5s infinite; }

        #game-title {
            font-size: 5vw; color: var(--primary); text-align: center; margin-bottom: 30px; margin-top: 0; 
            line-height: 1.5; text-shadow: 6px 6px 0px #005555; letter-spacing: 4px;
        }
        
        @media (min-width: 800px) { #game-title { font-size: 48px; } }

        #message-title, .menu-title {
            font-size: 32px; color: var(--success); margin-bottom: 40px; text-transform: uppercase; 
            text-shadow: 4px 4px 0px rgba(0, 255, 170, 0.3); text-align: center; line-height: 1.5; margin-top: 0;
        }

        .btn {
            background-color: #000; color: var(--primary); border: 4px solid var(--primary); padding: 15px 30px; 
            font-family: inherit; font-size: 16px; font-weight: 900; letter-spacing: 1px; cursor: pointer; 
            box-shadow: 6px 6px 0px var(--primary); transition: all 0.1s; margin: 10px; text-transform: uppercase; 
            width: 80%; max-width: 350px; text-align: center;
        }

        .btn:hover { background-color: var(--primary); color: #000; transform: translate(-2px, -2px); box-shadow: 8px 8px 0px #fff; }
        .btn:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px #fff; }

        .btn-square { width: 140px; height: 140px; padding: 10px; display: flex; align-items: center; justify-content: center; flex-direction: column; line-height: 1.3; box-sizing: border-box; max-width: none; }
        .btn-large.btn-square { width: 200px; height: 200px; font-size: 32px; border-width: 6px; }
        .btn-side.btn-square { width: 130px; height: 130px; font-size: 14px; }
        .btn-small.btn-square { width: 70px; height: 70px; font-size: 24px; padding: 0; }

        .btn .modern-icon { width: 50%; height: 50%; pointer-events: none; filter: drop-shadow(0 0 3px currentColor); }
        .btn .retro-icon { display: none; width: 50%; height: 50%; pointer-events: none; shape-rendering: crispEdges; fill: currentColor; }
        .retro-style .btn .modern-icon { display: none; }
        .retro-style .btn .retro-icon { display: block; }

        .btn-p1 { color: var(--p1-color); border-color: var(--p1-color); box-shadow: 6px 6px 0px var(--p1-color); }
        .btn-p1:hover { background-color: var(--p1-color); color: #000; }
        .btn-p2 { color: var(--p2-color); border-color: var(--p2-color); box-shadow: 6px 6px 0px var(--p2-color); }
        .btn-p2:hover { background-color: var(--p2-color); color: #000; }
        
        .btn-skin-p1 { color: var(--p1-skin-color); border-color: var(--p1-skin-color); box-shadow: 6px 6px 0px var(--p1-skin-color); }
        .btn-skin-p1:hover { background-color: var(--p1-skin-color); color: #000; }
        .btn-skin-p2 { color: var(--p2-skin-color); border-color: var(--p2-skin-color); box-shadow: 6px 6px 0px var(--p2-skin-color); }
        .btn-skin-p2:hover { background-color: var(--p2-skin-color); color: #000; }

        .btn-secondary { color: var(--success); border-color: var(--success); box-shadow: 6px 6px 0px var(--success); }
        .btn-secondary:hover { background-color: var(--success); color: #000; }
        .menu-row { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; max-width: 700px; }
        .menu-row .btn { margin: 0; }

        .skin-controls { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .skin-controls .btn { margin: 0; }
        .skin-controls .btn .modern-icon { filter: none; } /* Removes shadow from arrows */
        .skin-name-display { font-size: 24px; color: #fff; width: 180px; text-align: center; text-shadow: 3px 3px 0px #000; }
        .skin-section-title { font-size: 18px; text-align: center; font-weight: 900; letter-spacing: 2px; padding-left: 2px; margin-bottom: 10px; text-shadow: 2px 2px 0px #000; }
        #p2-controls-hint { color: #aaa; font-size: 10px; margin-top: -5px; margin-bottom: 20px; text-align: center; }

        #mobile-controls { 
            display: none; width: 100%; max-width: 1000px; padding: 20px 40px; box-sizing: border-box; 
            justify-content: space-between; align-items: flex-end; position: absolute; bottom: 30px; 
            left: 50%; transform: translateX(-50%); z-index: 50; pointer-events: none; 
        }
        
        .player-controls-half { display: flex; gap: 30px; align-items: flex-end; pointer-events: none; }
        #mobile-controls:not(.two-player) #p1-half { width: 100%; justify-content: space-between; }
        #mobile-controls:not(.two-player) .p2-controls { display: none !important; }
        
        /* 2-Player Mobile Split Layout */
        #mobile-controls.two-player { max-width: 100%; padding: 10px 20px; bottom: 10px; }
        #mobile-controls.two-player .player-controls-half { flex-direction: column; align-items: center; gap: 15px; }
        #mobile-controls.two-player .control-group { gap: 10px; }
        #mobile-controls.two-player .control-btn { width: 55px; height: 55px; border-radius: 0; border-width: 3px; }
        #mobile-controls.two-player .jump-btn { order: -1; width: 65px; height: 65px; border-radius: 0; }
        #mobile-controls.two-player .p1-c { box-shadow: 4px 4px 0px var(--p1-skin-color); }
        #mobile-controls.two-player .p2-c { box-shadow: 4px 4px 0px var(--p2-skin-color); }

        .control-group { display: flex; gap: 30px; pointer-events: auto; }
        .control-btn { 
            background-color: #000; border: 4px solid transparent; 
            width: 70px; height: 70px; border-radius: 0; display: flex; align-items: center; 
            justify-content: center; user-select: none; -webkit-user-select: none; touch-action: manipulation; 
            transition: all 0.1s; pointer-events: auto; box-sizing: border-box;
        }
        .control-btn.active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px #fff !important; }
        
        /* Player specific colors (Now linked dynamically to the CSS Variables) */
        .p1-c { border-color: var(--p1-skin-color); color: var(--p1-skin-color); box-shadow: 6px 6px 0px var(--p1-skin-color); opacity: 1; }
        .p1-c.active { background-color: var(--p1-skin-color); box-shadow: 2px 2px 0px #fff; color: #000 !important; border-color: #fff; }
        .p2-c { border-color: var(--p2-skin-color); color: var(--p2-skin-color); box-shadow: 6px 6px 0px var(--p2-skin-color); opacity: 1; }
        .p2-c.active { background-color: var(--p2-skin-color); box-shadow: 2px 2px 0px #fff; color: #000 !important; border-color: #fff; }

        .control-btn .modern-icon { width: 50%; height: 50%; pointer-events: none; filter: none; transition: none; }
        .control-btn.active .modern-icon { filter: none; transform: none; }
        .control-btn .retro-icon { display: none; width: 50%; height: 50%; pointer-events: none; shape-rendering: crispEdges; fill: currentColor; }
        
        /* Mobile Controls - Retro Mode */
        .retro-style .control-btn { background-color: #000; border-width: 4px; border-radius: 0 !important; }
        
        .retro-style .p1-c { border-color: var(--p1-skin-color); color: var(--p1-skin-color); box-shadow: 4px 4px 0px var(--p1-skin-color); }
        .retro-style .p1-c.active { background-color: var(--p1-skin-color); color: #000 !important; box-shadow: 2px 2px 0px #fff; border-color: #fff; }
        .retro-style .p2-c { border-color: var(--p2-skin-color); color: var(--p2-skin-color); box-shadow: 4px 4px 0px var(--p2-skin-color); }
        .retro-style .p2-c.active { background-color: var(--p2-skin-color); color: #000 !important; box-shadow: 2px 2px 0px #fff; border-color: #fff; }

        .retro-style .control-btn .modern-icon { display: none; }
        .retro-style .control-btn .retro-icon { display: block; width: 45%; height: 45%; shape-rendering: crispEdges; fill: currentColor; }
        .retro-style .control-btn.active .retro-icon { transform: none; }
        
        .jump-btn { width: 85px; height: 85px; font-size: 36px; border-radius: 0; }
        .jump-btn .modern-icon { width: 50%; height: 50%; }
        .jump-btn .retro-icon { width: 55%; height: 55%; }

        @media (max-width: 850px) {
            #game-container { width: 100vw; max-width: 100vw; height: 100vh; }
            #ui-layer { font-size: 12px; }
            #message-title, .menu-title { font-size: 24px; }
            .btn { font-size: 12px; padding: 12px 20px; }
            .btn-square { width: 100px; height: 100px; font-size: 12px; }
            .btn-large.btn-square { width: 140px; height: 140px; font-size: 24px; border-width: 4px; }
            .btn-side.btn-square { width: 90px; height: 90px; font-size: 10px; }
            .btn-small.btn-square { width: 50px; height: 50px; font-size: 16px; }
            .skin-name-display { font-size: 12px; width: 70px; }
            .skin-section-title { font-size: 14px; }
            .skin-controls { gap: 5px; }
            .menu-row { gap: 10px; flex-wrap: nowrap; }
        }
    </style>
</head>
<body class="modern-style">

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="800"></canvas>
        <div id="ui-layer">
            <div>
                <div id="level-text"></div>
                <div id="diamonds-text"></div>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end;">
                <div id="deaths-text"></div>
                <div id="timer-text">0:00.000</div>
                <div id="race-deaths-text" style="display: none; font-size: 12px; margin-top: 4px; text-shadow: 2px 2px 0px #000; line-height: 1.5; text-align: right;"></div>
            </div>
        </div>
        
        <div id="main-menu" class="visible">
            <h1 id="game-title">NEON<br>JUMPER</h1>
            <div class="menu-row">
                <button class="btn btn-secondary btn-side btn-square" onclick="openSkinsMenu()">SKINS</button>
                <button class="btn btn-large btn-square" onclick="openModeMenu()">PLAY</button>
                <button class="btn btn-secondary btn-side btn-square" id="style-btn" onclick="toggleStyle()">STYLE<br>MODERN</button>
            </div>
            <button class="btn btn-secondary" id="controls-btn" onclick="toggleMobileControls()" style="margin-top: 20px; padding: 10px 20px; border-width: 2px; font-size: 14px;">MOBILE CONTROLS: AUTO</button>
            <div id="lag-banner" style="color: #ffcc00; font-size: 12px; margin-top: 10px; text-shadow: 2px 2px 0px #000; letter-spacing: 1px;">GETTING LAG? USE RETRO STYLE!</div>
        </div>

        <div id="mode-menu">
            <h2 class="menu-title" style="color: var(--primary);">SELECT MODE</h2>
            <button class="btn" onclick="startGame('1P')">1 PLAYER</button>
            <button class="btn btn-p2" onclick="openTwoPlayerMenu()">2 PLAYER</button>
            <button class="btn btn-secondary btn-square" style="margin-top: 30px;" onclick="closeModeMenu()">BACK</button>
        </div>

        <div id="two-player-menu">
            <h2 class="menu-title" style="color: var(--p2-color);">2 PLAYER MODE</h2>
            <div class="menu-row">
                <button class="btn btn-large btn-square btn-secondary" onclick="startGame('COOP')" style="font-size: 24px;">CO-OP<br><br><span style="font-size:12px; color:#fff; text-shadow:none;">WORK TOGETHER</span></button>
                <button class="btn btn-large btn-square btn-p2" onclick="startGame('RACE')" style="font-size: 24px;">RACE<br><br><span style="font-size:12px; color:#fff; text-shadow:none;">FIRST TO END</span></button>
            </div>
            <div id="p2-controls-hint-2" style="color: #aaa; font-size: 10px; margin-top: 20px; text-align: center;">P1: W,A,D | P2: ARROWS</div>
            <button class="btn btn-secondary btn-square" style="margin-top: 30px;" onclick="closeTwoPlayerMenu()">BACK</button>
        </div>

        <div id="skins-menu">
            <h2 class="menu-title" style="position: absolute; top: 10%; left: 50%; transform: translateX(-50%); color: var(--primary); margin: 0; width: 100%;">SELECT SKINS</h2>
            
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -10px); display: flex; justify-content: center; width: 100%; max-width: 800px; padding: 0 20px; box-sizing: border-box;">
                <!-- Player 1 -->
                <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                    <div class="skin-section-title" style="color: var(--p1-skin-color);">PLAYER 1</div>
                    <div class="skin-controls" style="margin-top: 10px;">
                        <button class="btn btn-small btn-square btn-skin-p1" onclick="prevSkin(1)">
                            <svg class="modern-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                            <svg class="retro-icon" viewBox="0 0 7 7"><rect x="4" y="1" width="1" height="5"/><rect x="3" y="2" width="1" height="3"/><rect x="2" y="3" width="1" height="1"/></svg>
                        </button>
                        <div id="p1-skin-name" class="skin-name-display">CYAN</div>
                        <button class="btn btn-small btn-square btn-skin-p1" onclick="nextSkin(1)">
                            <svg class="modern-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            <svg class="retro-icon" viewBox="0 0 7 7"><rect x="2" y="1" width="1" height="5"/><rect x="3" y="2" width="1" height="3"/><rect x="4" y="3" width="1" height="1"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Player 2 -->
                <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                    <div class="skin-section-title" style="color: var(--p2-skin-color);">PLAYER 2</div>
                    <div class="skin-controls" style="margin-top: 10px;">
                        <button class="btn btn-small btn-square btn-skin-p2" onclick="prevSkin(2)">
                            <svg class="modern-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                            <svg class="retro-icon" viewBox="0 0 7 7"><rect x="4" y="1" width="1" height="5"/><rect x="3" y="2" width="1" height="3"/><rect x="2" y="3" width="1" height="1"/></svg>
                        </button>
                        <div id="p2-skin-name" class="skin-name-display">MAGENTA</div>
                        <button class="btn btn-small btn-square btn-skin-p2" onclick="nextSkin(2)">
                            <svg class="modern-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            <svg class="retro-icon" viewBox="0 0 7 7"><rect x="2" y="1" width="1" height="5"/><rect x="3" y="2" width="1" height="3"/><rect x="4" y="3" width="1" height="1"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <button class="btn btn-secondary" style="position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); margin: 0; width: 60%; max-width: 300px;" onclick="closeSkinsMenu()">MAIN MENU</button>
        </div>

        <div id="message-overlay">
            <div id="message-title">STAGE CLEAR</div>
            <div id="flawless-message" style="display: none; color: #ffcc00; font-size: 20px; margin-top: -20px; margin-bottom: 30px; text-shadow: 2px 2px 0px #886600; text-align: center; font-weight: 900; letter-spacing: 2px;">FLAWLESS RUN! 0 DEATHS!</div>
            <div style="display: flex; gap: 20px;">
                <button class="btn btn-secondary btn-square" id="menu-btn" onclick="returnToMenu()" style="display: none;">MAIN<br>MENU</button>
                <button class="btn btn-square" id="next-btn" onclick="startNextLevel()">NEXT<br>STAGE</button>
            </div>
        </div>

        <!-- NEW STUDIO INTRO -->
        <div id="studio-intro">
            <div id="studio-text-1">A GAME MADE BY</div>
            <div id="studio-text-2">CAPINATOR</div>
        </div>

        <div id="sound-overlay">
            <h2 class="menu-title" style="color: var(--primary); font-size: 24px;">CLICK ANYWHERE<br><br>TO ENABLE SOUND</h2>
        </div>

        <div id="pause-btn" onclick="togglePause()">❚❚ PAUSE</div>
        
        <div id="pause-menu">
            <h2 class="menu-title" style="color: var(--primary);">PAUSED</h2>
            <div class="menu-row">
                <button class="btn btn-square" onclick="togglePause()" style="width: 140px; height: 140px;">RESUME</button>
                <button class="btn btn-secondary btn-square" onclick="quitToMenu()" style="width: 140px; height: 140px;">MAIN<br>MENU</button>
            </div>
        </div>

        <div id="mobile-controls">
            <!-- Player 1 Controls (Cyan) -->
            <div class="player-controls-half" id="p1-half">
                <div class="control-group">
                    <div class="control-btn p1-c" id="btn-left">
                        <svg class="modern-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        <svg class="retro-icon" viewBox="0 0 7 7"><rect x="4" y="1" width="1" height="5"/><rect x="3" y="2" width="1" height="3"/><rect x="2" y="3" width="1" height="1"/></svg>
                    </div>
                    <div class="control-btn p1-c" id="btn-right">
                        <svg class="modern-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        <svg class="retro-icon" viewBox="0 0 7 7"><rect x="2" y="1" width="1" height="5"/><rect x="3" y="2" width="1" height="3"/><rect x="4" y="3" width="1" height="1"/></svg>
                    </div>
                </div>
                <div class="control-btn p1-c jump-btn" id="btn-jump">
                    <svg class="modern-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    <svg class="retro-icon" viewBox="0 0 7 7"><rect x="1" y="4" width="5" height="1"/><rect x="2" y="3" width="3" height="1"/><rect x="3" y="2" width="1" height="1"/></svg>
                </div>
            </div>

            <!-- Player 2 Controls (Magenta - Only shows in 2P mode) -->
            <div class="player-controls-half p2-controls" id="p2-half">
                <div class="control-btn p2-c jump-btn" id="btn-jump-p2">
                    <svg class="modern-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                    <svg class="retro-icon" viewBox="0 0 7 7"><rect x="1" y="4" width="5" height="1"/><rect x="2" y="3" width="3" height="1"/><rect x="3" y="2" width="1" height="1"/></svg>
                </div>
                <div class="control-group">
                    <div class="control-btn p2-c" id="btn-left-p2">
                        <svg class="modern-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        <svg class="retro-icon" viewBox="0 0 7 7"><rect x="4" y="1" width="1" height="5"/><rect x="3" y="2" width="1" height="3"/><rect x="2" y="3" width="1" height="1"/></svg>
                    </div>
                    <div class="control-btn p2-c" id="btn-right-p2">
                        <svg class="modern-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        <svg class="retro-icon" viewBox="0 0 7 7"><rect x="2" y="1" width="1" height="5"/><rect x="3" y="2" width="1" height="3"/><rect x="4" y="3" width="1" height="1"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        let audioCtx = null;
        let musicTrack = 'none';
        let musicTime = 0;
        let nextNoteTime = 0;
        let musicTimerID = null;
        let isAudioUnlocked = false;
        let hasPlayedIntro = false;
        
        const initAudio = () => {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                audioCtx = new AudioContext();
            }
            
            if (!isAudioUnlocked) {
                // Play a silent oscillator to forcefully unlock iOS Safari and mobile audio without a pop
                try {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0;
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(0);
                    osc.stop(audioCtx.currentTime + 0.1);
                } catch (e) {}

                audioCtx.resume().then(() => {
                    isAudioUnlocked = true;
                    
                    const overlay = document.getElementById('sound-overlay');
                    const studioIntro = document.getElementById('studio-intro');
                    const text1 = document.getElementById('studio-text-1');
                    const text2 = document.getElementById('studio-text-2');
                    
                    if (overlay && overlay.style.display !== 'none') {
                        studioIntro.style.transition = 'none';
                        studioIntro.style.opacity = '1';
                        studioIntro.style.pointerEvents = 'auto';
                        
                        overlay.style.opacity = '0';
                        setTimeout(() => { 
                            overlay.style.display = 'none'; 
                            
                            text1.style.opacity = '1';
                            sfxIntro1();
                            
                            setTimeout(() => {
                                text2.style.opacity = '1';
                                text2.style.transform = 'scale(1)';
                                sfxIntro2();
                                
                                setTimeout(() => {
                                    studioIntro.style.transition = 'opacity 0.5s';
                                    studioIntro.style.opacity = '0';
                                    setTimeout(() => {
                                        studioIntro.style.display = 'none';
                                        hasPlayedIntro = true;
                                        
                                        if (gameState === 'MENU') {
                                            setMusicTrack('menu');
                                        }
                                    }, 500);
                                }, 2000);
                            }, 1000);
                            
                        }, 400); 
                    } else if (hasPlayedIntro && musicTrack !== 'none' && !musicTimerID) {
                        nextNoteTime = audioCtx.currentTime + 0.05;
                        scheduler();
                    }
                }).catch(err => {
                    console.log("Audio unlock rejected by browser. Waiting for explicit click.");
                });
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        };
        
        window.addEventListener('pointerdown', initAudio);
        window.addEventListener('click', initAudio);
        window.addEventListener('keydown', initAudio);

        window.addEventListener('beforeunload', () => { 
            if (audioCtx && audioCtx.state !== 'closed') audioCtx.close(); 
        });
        
        document.addEventListener('visibilitychange', () => {
            if (!audioCtx) return;
            if (document.hidden && audioCtx.state === 'running') {
                audioCtx.suspend();
            } else if (!document.hidden && musicTrack !== 'none' && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });

        function sfxJump() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function sfxBounce() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function sfxCollect() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function sfxDeath() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function sfxUnlock() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const notes = [523.25, 659.25, 783.99, 1046.50]; 
            notes.forEach((freq, i) => {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle';
                osc.frequency.value = freq; let start = audioCtx.currentTime + i * 0.1;
                gain.gain.setValueAtTime(0, start); gain.gain.linearRampToValueAtTime(0.05, start + 0.05); gain.gain.linearRampToValueAtTime(0, start + 0.3);
                osc.start(start); osc.stop(start + 0.3);
            });
        }

        function sfxPortal() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const notes = [440, 554.37, 659.25, 880];
            notes.forEach((freq, i) => {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square';
                osc.frequency.value = freq; let start = audioCtx.currentTime + i * 0.08;
                gain.gain.setValueAtTime(0, start); gain.gain.linearRampToValueAtTime(0.05, start + 0.04); gain.gain.linearRampToValueAtTime(0, start + 0.08);
                osc.start(start); osc.stop(start + 0.08);
            });
        }

        function sfxFanfare() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const notes = [
                {f: 523.25, d: 0.15}, {f: 659.25, d: 0.15}, {f: 783.99, d: 0.15}, 
                {f: 1046.50, d: 0.3}, {f: 880.00, d: 0.15}, {f: 987.77, d: 0.15}, {f: 1046.50, d: 0.8}
            ];
            let t = audioCtx.currentTime + 0.1; 
            notes.forEach(note => {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square';
                osc.frequency.value = note.f; gain.gain.setValueAtTime(0.06, t); gain.gain.linearRampToValueAtTime(0, t + note.d - 0.01);
                osc.start(t); osc.stop(t + note.d); t += note.d;
            });
        }

        function sfxUIClick() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function sfxIntro1() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 1.0);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.5);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.0);
            osc.start(); osc.stop(audioCtx.currentTime + 1.0);
        }

        function sfxIntro2() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const notes = [130.81, 164.81, 196.00, 261.63]; 
            notes.forEach((freq) => {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.0);
                osc.start(); osc.stop(audioCtx.currentTime + 3.0);
            });
            let osc2 = audioCtx.createOscillator(); let gain2 = audioCtx.createGain();
            osc2.connect(gain2); gain2.connect(audioCtx.destination); osc2.type = 'square';
            osc2.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc2.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 1.0);
            gain2.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
            osc2.start(); osc2.stop(audioCtx.currentTime + 1.0);
        }

        window.addEventListener('click', (e) => {
            if (e.target.closest('.btn') || e.target.id === 'pause-btn') {
                sfxUIClick();
            }
        });

        function scheduleNote(beatNumber, time) {
            if (!audioCtx || musicTrack === 'none') return;
            
            const isRetro = currentStyle === 'RETRO';

            if (musicTrack === 'menu') {
                if (beatNumber % 4 === 0) { 
                    let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination); 
                    
                    osc.type = isRetro ? 'square' : 'sine';
                    const notes = [220, 261.63, 329.63, 261.63, 392.00, 329.63, 261.63, 220]; 
                    osc.frequency.value = notes[(beatNumber / 4) % notes.length]; 
                    
                    if (isRetro) {
                        gain.gain.setValueAtTime(0.015, time); 
                        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
                        osc.start(time); osc.stop(time + 0.15);
                    } else {
                        gain.gain.setValueAtTime(0.001, time); 
                        gain.gain.linearRampToValueAtTime(0.08, time + 0.1); 
                        gain.gain.linearRampToValueAtTime(0.001, time + 0.5);
                        osc.start(time); osc.stop(time + 0.5);
                    }
                }
            } else if (musicTrack.includes('_')) {
                let parts = musicTrack.split('_');
                let type = parts[0]; 
                let lvl = parseInt(parts[1]);
                
                let baseFreq = 130.81 * Math.pow(1.059463, lvl); 
                
                if (type === 'race') {
                    baseFreq = 110.00 * Math.pow(1.059463, lvl); 
                    
                    if (beatNumber % 2 === 0) {
                        let bassOsc = audioCtx.createOscillator(); let bassGain = audioCtx.createGain();
                        bassOsc.connect(bassGain); bassGain.connect(audioCtx.destination);
                        bassOsc.type = isRetro ? 'sawtooth' : 'triangle';
                        bassOsc.frequency.value = baseFreq / 2;
                        bassGain.gain.setValueAtTime(isRetro ? 0.04 : 0.06, time); 
                        bassGain.gain.exponentialRampToValueAtTime(0.001, time + (isRetro ? 0.15 : 0.25));
                        bassOsc.start(time); bassOsc.stop(time + (isRetro ? 0.15 : 0.25));
                    }
                    
                    let patterns = [[1, 1.2, 1.5, 1.2], [1, 1.18, 1.5, 1.18], [1.5, 1.41, 1.18, 1], [1.5, 1.2, 1.41, 1.5]]; 
                    let p = patterns[lvl % patterns.length];
                    if (beatNumber % 1 === 0) { 
                        let noteOsc = audioCtx.createOscillator(); let noteGain = audioCtx.createGain();
                        noteOsc.connect(noteGain); noteGain.connect(audioCtx.destination); 
                        noteOsc.type = isRetro ? 'square' : 'sine';
                        let freqMult = p[beatNumber % p.length];
                        if (lvl > 2 && beatNumber % 8 === 0) freqMult *= 2; 
                        noteOsc.frequency.value = baseFreq * 2 * freqMult;
                        
                        if (isRetro) {
                            noteGain.gain.setValueAtTime(0.015, time); 
                            noteGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                            noteOsc.start(time); noteOsc.stop(time + 0.1);
                        } else {
                            noteGain.gain.setValueAtTime(0.001, time); 
                            noteGain.gain.linearRampToValueAtTime(0.03, time + 0.05); 
                            noteGain.gain.linearRampToValueAtTime(0.001, time + 0.15);
                            noteOsc.start(time); noteOsc.stop(time + 0.15);
                        }
                    }
                } else if (type === 'coop') {
                    if (beatNumber % 4 === 0) {
                        let bassOsc = audioCtx.createOscillator(); let bassGain = audioCtx.createGain();
                        bassOsc.connect(bassGain); bassGain.connect(audioCtx.destination);
                        bassOsc.type = isRetro ? 'square' : 'sine'; 
                        bassOsc.frequency.value = baseFreq / 2;
                        bassGain.gain.setValueAtTime(isRetro ? 0.03 : 0.06, time); 
                        bassGain.gain.exponentialRampToValueAtTime(0.001, time + (isRetro ? 0.25 : 0.4));
                        bassOsc.start(time); bassOsc.stop(time + (isRetro ? 0.25 : 0.4));
                    }
                    
                    let patterns = [[1, 1.25, 1.5, 2], [1.25, 1.5, 1.66, 2], [2, 1.5, 1.25, 1], [1, 1.5, 2, 1.5]]; 
                    let p = patterns[lvl % patterns.length];
                    if (beatNumber % 2 === 0) { 
                        let noteOsc = audioCtx.createOscillator(); let noteGain = audioCtx.createGain();
                        noteOsc.connect(noteGain); noteGain.connect(audioCtx.destination); 
                        noteOsc.type = isRetro ? 'square' : 'sine';
                        let freqMult = p[(beatNumber / 2) % p.length];
                        if (lvl > 3 && beatNumber % 4 === 0) freqMult *= 1.5; 
                        noteOsc.frequency.value = baseFreq * 2 * freqMult;
                        
                        if (isRetro) {
                            noteGain.gain.setValueAtTime(0.02, time); 
                            noteGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
                            noteOsc.start(time); noteOsc.stop(time + 0.15);
                        } else {
                            noteGain.gain.setValueAtTime(0.001, time); 
                            noteGain.gain.linearRampToValueAtTime(0.03, time + 0.05); 
                            noteGain.gain.linearRampToValueAtTime(0.001, time + 0.25);
                            noteOsc.start(time); noteOsc.stop(time + 0.25);
                        }
                    }
                } else {
                    if (beatNumber % 4 === 0) {
                        let bassOsc = audioCtx.createOscillator(); let bassGain = audioCtx.createGain();
                        bassOsc.connect(bassGain); bassGain.connect(audioCtx.destination);
                        
                        bassOsc.type = isRetro ? ((lvl % 2 === 0) ? 'square' : 'sawtooth') : 'triangle'; 
                        bassOsc.frequency.value = baseFreq / 2;
                        
                        bassGain.gain.setValueAtTime(isRetro ? 0.03 : 0.05, time); 
                        bassGain.gain.exponentialRampToValueAtTime(0.001, time + (isRetro ? 0.25 : 0.35));
                        bassOsc.start(time); bassOsc.stop(time + (isRetro ? 0.25 : 0.35));
                    }
                    
                    let patterns = [[1, 1.2, 1.5, 1.2], [1, 1.33, 1.5, 1.33], [1.5, 1.2, 1, 1.2], [1, 1.5, 2, 1.5]];
                    let p = patterns[lvl % patterns.length];
                    if (beatNumber % 2 === 0) { 
                        let noteOsc = audioCtx.createOscillator(); let noteGain = audioCtx.createGain();
                        noteOsc.connect(noteGain); noteGain.connect(audioCtx.destination); 
                        
                        noteOsc.type = isRetro ? 'square' : 'sine';
                        let freqMult = p[(beatNumber / 2) % p.length]; if (lvl > 4 && beatNumber % 8 === 0) freqMult *= 1.2; 
                        noteOsc.frequency.value = baseFreq * 2 * freqMult;
                        
                        if (isRetro) {
                            noteGain.gain.setValueAtTime(0.015, time); 
                            noteGain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
                            noteOsc.start(time); noteOsc.stop(time + 0.08);
                        } else {
                            noteGain.gain.setValueAtTime(0.001, time); 
                            noteGain.gain.linearRampToValueAtTime(0.02, time + 0.05); 
                            noteGain.gain.linearRampToValueAtTime(0.001, time + 0.25);
                            noteOsc.start(time); noteOsc.stop(time + 0.25);
                        }
                    }
                }
            }
        }
        
        function scheduler() {
            if (!audioCtx) return;
            if (nextNoteTime < audioCtx.currentTime) nextNoteTime = audioCtx.currentTime + 0.05;
            
            if (typeof gameState !== 'undefined' && gameState === 'PAUSED') {
                musicTimerID = setTimeout(scheduler, 25);
                return;
            }
            
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                scheduleNote(musicTime, nextNoteTime);
                nextNoteTime += 0.125; musicTime++;
            }
            musicTimerID = setTimeout(scheduler, 25);
        }
        
        function setMusicTrack(track) {
            if (musicTrack === track) return;
            musicTrack = track;
            
            if (track !== 'none' && audioCtx && audioCtx.state !== 'suspended') {
                if (!musicTimerID) { nextNoteTime = audioCtx.currentTime + 0.05; musicTime = 0; scheduler(); }
            } else if (track === 'none') {
                clearTimeout(musicTimerID); musicTimerID = null;
            }
        }

        // --- GAME ENGINE ---
        let currentStyle = 'MODERN';
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const skins = [
            { name: "CYAN", color: "#00f0ff", eye: "#000", trail: "rgba(0, 240, 255, 0.4)" },
            { name: "MAGENTA", color: "#ff00ff", eye: "#000", trail: "rgba(255, 0, 255, 0.4)" },
            { name: "LIME", color: "#aaff00", eye: "#000", trail: "rgba(170, 255, 0, 0.4)" },
            { name: "WHITE", color: "#ffffff", eye: "#000", trail: "rgba(255, 255, 255, 0.4)" },
            { name: "BLACK", color: "#222222", glow: "#ff0000", eye: "#ff0000", trail: "rgba(255, 0, 0, 0.5)" }, 
            { name: "GOLD", color: "#ffcc00", eye: "#000", trail: "rgba(255, 204, 0, 0.4)" }
        ];
        let p1SkinIndex = 0; 
        let p2SkinIndex = 1; 

        const themes = {
            neon: { id: 'neon', bg: '#1a1a24', grid: 'rgba(255, 255, 255, 0.1)', plat: '#38384f', platTop: '#5c5c7d', platBot: '#1f1f2e', hazard: '#ff0055', hazardInner: '#ff88bb', goal: '#00ffaa', decorColor: '#00f0ff' },
            acid: { id: 'acid', bg: '#142410', grid: 'rgba(170, 255, 0, 0.1)', plat: '#2d4a22', platTop: '#4a7a38', platBot: '#162411', hazard: '#aaff00', hazardInner: '#e5ff99', goal: '#00f0ff', decorColor: '#aaff00' },
            forge: { id: 'forge', bg: '#241010', grid: 'rgba(255, 102, 0, 0.1)', plat: '#4a2222', platTop: '#7a3838', platBot: '#241111', hazard: '#ff6600', hazardInner: '#ffbb88', goal: '#00ffaa', decorColor: '#ff6600' },
            crystal: { id: 'crystal', bg: '#1b1024', grid: 'rgba(0, 255, 255, 0.1)', plat: '#3d224a', platTop: '#64387a', platBot: '#1e1124', hazard: '#00ffff', hazardInner: '#aaffff', goal: '#ff00ff', decorColor: '#ff00ff' },
            core: { id: 'core', bg: '#0a0a0a', grid: 'rgba(255, 204, 0, 0.15)', plat: '#222222', platTop: '#444444', platBot: '#000000', hazard: '#ff0000', hazardInner: '#ffaaaa', goal: '#ffffff', decorColor: '#ff0000' },

        function updateAmbient() {
            if (!currentTheme) return; const time = Date.now() / 1000;
            ambientEntities.forEach(p => {
                let t = currentTheme.id;
                if(t === 'ice' || t === 'sun' || t === 'neon') { p.y += p.speed; p.x += Math.sin(time + p.seed) * 0.5; } 
                else if (t === 'forge' || t === 'magma' || t === 'acid') { p.y -= p.speed; p.x += Math.sin(time * 2 + p.seed) * 1; } 
                else if (t === 'cyber' || t === 'core') { p.y += p.speed * 4; } 
                else { p.x += Math.cos(time * 0.5 + p.seed) * 0.5; p.y += Math.sin(time * 0.5 + p.seed) * 0.5; }
                if (p.y > ROWS * TILE_SIZE + 100) p.y = -50; if (p.y < -100) p.y = ROWS * TILE_SIZE + 50;
                if (p.x > COLS * TILE_SIZE + 100) p.x = -50; if (p.x < -100) p.x = COLS * TILE_SIZE + 50;
            });
        }

        function loadLevel(index) {
            platforms = []; hazards = []; bouncers = []; crumblers = []; movers = []; collectibles = []; decorations = [];

                currentTheme = levelData.theme || themes.neon;

            for (let row = 0; row < ROWS; row++) {
                if (!map || typeof map[row] === 'undefined' || map[row] === null) continue; // Bulletproof check
                for (let col = 0; col < COLS; col++) {
                    const char = map[row][col] || '.'; const x = col * TILE_SIZE; const y = row * TILE_SIZE;
                    if (char === '@') { spawnX = x + (TILE_SIZE - 24) / 2; spawnY = y - 24; } 
                    else if (char === '^') { hazards.push({ x: x, y: y + TILE_SIZE/2, visualX: x, visualY: y, width: TILE_SIZE, height: TILE_SIZE/2 }); } 
                    else if (char === '$') { goal = { x: x, y: y, visualX: x, visualY: y, width: TILE_SIZE, height: TILE_SIZE }; }
                    else if (char === '*') { collectibles.push({ x: x + 8, y: y + 8, width: 24, height: 24, active: true, startY: y + 8 }); }
                    else if (char === 'B') { 
                        let lastB = bouncers[bouncers.length - 1];
                        if (lastB && lastB.y === y && lastB.x + lastB.width === x) lastB.width += TILE_SIZE; // Merge adjacent bouncers
                        else bouncers.push({ x: x, y: y, width: TILE_SIZE, height: TILE_SIZE }); 
                    }
                    else if (char === 'C') { crumblers.push({ x: x, y: y, width: TILE_SIZE, height: TILE_SIZE, active: true, crumbling: false, timer: 0, respawnTimer: 0 }); }
                    else if (char === 'M') { movers.push({ type: 'M', x: x, y: y, startX: x, startY: y, width: TILE_SIZE * 1.5, height: TILE_SIZE, dx: 0, dy: 0, speed: 1.2, dist: 140 }); }

                }
            }

            for (let row = 0; row < ROWS; row++) {
                if (!map || typeof map[row] === 'undefined' || map[row] === null) continue; // Bulletproof check
                let currentPlat = null;
                for (let col = 0; col < COLS; col++) {
                    const char = map[row][col] || '.';
                    if (char === '#' || char === '@') { 
                        if (currentPlat) currentPlat.width += TILE_SIZE; else currentPlat = { x: col * TILE_SIZE, y: row * TILE_SIZE, width: TILE_SIZE, height: TILE_SIZE };
                    } else {

                    }
                }
                if (currentPlat) platforms.push(currentPlat);
            }

                currentZoom = BASE_ZOOM;

                cameraY = Math.max(0, spawnY - canvas.height / (2 * currentZoom) - 100); 
            } 
            else { 
                currentZoom = BASE_ZOOM; 
                cameraX = Math.max(0, Math.min(spawnX - canvas.width / (2 * currentZoom), Math.max(0, COLS * TILE_SIZE - canvas.width / currentZoom))); 
                cameraY = Math.max(0, Math.min(spawnY - canvas.height / (2 * currentZoom), Math.max(0, ROWS * TILE_SIZE + 1000 - canvas.height / currentZoom))); 
            }

            for (let key in keys) keys[key] = false;
            initAmbient();
            
            updateScoreUI();
        }

        function die(p) {
            sfxDeath(); createDeathParticles(p.x + p.width/2, p.y + p.height/2, currentTheme.hazard);
            
            if (gameMode === 'RACE') { 
                if (p.id === 1) p1Deaths++; 
                else p2Deaths++; 
            } else { 
                singlePlayerDeaths++; 
            }
            updateScoreUI();
            
            p.x = p.startX; p.y = p.startY; p.vx = 0; p.vy = 0; p.isGrounded = false;
            p.coyoteFrames = 0; p.jumpBuffer = 0; p.jumpsLeft = p.maxJumps; p.touchingWall = 0; p.standingOn = null;
            p.rotation = 0; p.targetRotation = 0; p.scale = 1; p.lean = 0; p.runStretchX = 0; p.idleBlend = 0; p.trail = []; p.lastGrounded = true;
            keys[p.controls.left] = false; keys[p.controls.right] = false; keys[p.controls.up] = false;
            createDeathParticles(p.x + p.width/2, p.y + p.height/2, p.skin.glow || p.skin.color);
            updateScoreUI();
        }

        function completeLevel(winnerId) {
            pauseBtn.style.display = 'none';
            if (isLevelComplete) return; isLevelComplete = true; victoryPhase = 1; victoryTimer = 0;
            
            let collectedThisLevel = collectibles.filter(c => !c.active).length;
            totalDiamonds += collectedThisLevel;

            if (gameMode === 'RACE') { if (winnerId === 1) p1Wins++; else p2Wins++; updateScoreUI(); }

            if (currentLevelIndex >= levels.length - 1) {
                isGameBeaten = true; setMusicTrack('none'); sfxFanfare();
                runTimerRunning = false;
                if (gameMode === 'RACE') {
                    messageTitle.innerText = p1Wins > p2Wins ? "P1 WINS!" : (p2Wins > p1Wins ? "P2 WINS!" : "IT'S A TIE!");
                    messageTitle.style.color = p1Wins > p2Wins ? 'var(--p1-color)' : (p2Wins > p1Wins ? 'var(--p2-color)' : 'var(--success)');
                    flawlessMessage.style.display = 'none';
                } else if (gameMode === 'COOP') {
                    messageTitle.innerText = "TEAMWORK!"; messageTitle.style.color = currentTheme.goal;
                    if (singlePlayerDeaths === 0) flawlessMessage.style.display = 'block'; else flawlessMessage.style.display = 'none';
                } else {
                    messageTitle.innerText = "GAME CLEARED!"; messageTitle.style.color = currentTheme.goal;
                    if (singlePlayerDeaths === 0) flawlessMessage.style.display = 'block'; else flawlessMessage.style.display = 'none';
                }
            } else {
                sfxPortal();
                if (gameMode === 'RACE') { messageTitle.innerText = `P${winnerId} WINS!`; messageTitle.style.color = winnerId === 1 ? 'var(--p1-color)' : 'var(--p2-color)'; } 
                else if (gameMode === 'COOP') { messageTitle.innerText = "TEAM CLEAR"; messageTitle.style.color = currentTheme.goal; }
                else { messageTitle.innerText = "STAGE CLEAR"; messageTitle.style.color = currentTheme.goal; }
                flawlessMessage.style.display = 'none';
            }
        }

        function showLevelCompleteUI() {
            if (victoryPhase === 2) return; victoryPhase = 2; 
            createDeathParticles(goal.visualX + TILE_SIZE/2, goal.visualY + TILE_SIZE/2, currentTheme.goal); messageOverlay.classList.add('visible');
            if (isGameBeaten) { nextBtn.style.display = 'none'; menuBtn.style.display = 'flex'; menuBtn.style.transform = 'translateX(100%)'; messageOverlay.style.background = 'transparent'; danceTimer = 0; } 
            else { nextBtn.style.display = 'flex'; menuBtn.style.display = 'none'; menuBtn.style.transform = 'none'; messageOverlay.style.background = ''; }
        }

        function startNextLevel() { 
            if (currentLevelIndex >= levels.length - 1) return;
            messageOverlay.classList.remove('visible'); 
            currentLevelIndex++; 
            loadLevel(currentLevelIndex); 
        }

        function AABB(rect1, rect2) { return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x && rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y; }

        function updatePhysics() {
            let now = Date.now();
            if (runTimerRunning && gameState === 'PLAYING' && !isLevelComplete) {
                runTimeElapsed += (now - runStartTime);
            }
            runStartTime = now;

            if (runTimerRunning) {
                let m = Math.floor(runTimeElapsed / 60000); 
                let s = Math.floor((runTimeElapsed % 60000) / 1000); 
                let ms = runTimeElapsed % 1000;
                timerText.innerText = `${m}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(3, '0')}`;
            }

            updateAmbient();
            for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= p.decay; if (p.life <= 0) particles.splice(i, 1); }
            
            if (particles.length > 150) particles.splice(0, particles.length - 150); 

            if (gameState === 'MENU' || gameState === 'SKINS' || gameState === 'MODES' || gameState === 'PAUSED') return;

            if (introTimer < 200) introTimer++;

            // --- INTRO CUTSCENES ---
            if (gameState === 'INTRO') {
                if (introType === 'LOOK') {
                    players.forEach(p => {
                        keys[p.controls.left] = false;
                        keys[p.controls.right] = false;
                        keys[p.controls.up] = false;
                        
                        if (introTimer === 20) { p.facingRight = true; p.runStretchX = 15; p.lean = 0.4; }
                        if (introTimer === 60) { p.facingRight = false; p.runStretchX = 15; p.lean = -0.4; }
                        if (introTimer === 100) {
                            p.facingRight = true;
                            p.vy = -6; 
                            p.isGrounded = false;
                            if (p.id === 1) sfxJump();
                            createDustParticles(p.x + p.width/2, p.y + p.height);
                        }
                        if (introTimer > 100 && introTimer <= 120) {
                            p.x += (p.startX - p.x) * 0.15; 
                        }
                    });
                    if (introTimer >= 120) gameState = 'PLAYING';
                } 
                else if (introType === 'STARE') {
                    players.forEach(p => {
                        keys[p.controls.left] = false;
                        keys[p.controls.right] = false;
                        keys[p.controls.up] = false;
                        
                        if (introTimer === 20) { 
                            p.facingRight = (p.id === 1); 
                            p.runStretchX = 15; 
                            p.lean = (p.id === 1) ? 0.3 : -0.3; 
                        }
                        if (introTimer === 60) { 
                            p.vy = -3; 
                            p.isGrounded = false;
                            if (p.id === 1) sfxJump();
                        }
                        if (introTimer === 100) {
                            p.facingRight = true; 
                            p.vy = -6; 
                            p.isGrounded = false;
                            if (p.id === 1) sfxJump();
                            createDustParticles(p.x + p.width/2, p.y + p.height);
                        }
                        if (introTimer > 100 && introTimer <= 120) {
                            p.x += (p.startX - p.x) * 0.15; 
                        }
                    });
                    if (introTimer >= 120) gameState = 'PLAYING';
                }
                else if (introType === 'BEAM') {
                    players.forEach(p => {
                        keys[p.controls.left] = false;
                        keys[p.controls.right] = false;
                        keys[p.controls.up] = false;
                        
                        if (introTimer < 30) {
                            p.scale = 0;
                            p.vy = 0;
                            p.y = p.startY - 100; 
                        } else if (introTimer === 30) {
                            p.scale = 1;
                            p.y = p.startY - 10; 
                            if (p.id === 1) sfxPortal();
                            for(let i=0; i<15; i++) particles.push(createParticle(p.startX + p.width/2, p.startY + p.height, currentTheme.goal, 1.5));
                        } else if (introTimer > 30 && introTimer < 60) {
                            p.x += (p.startX - p.x) * 0.2; 
                        }
                    });
                    if (introTimer >= 60) gameState = 'PLAYING';
                }
            }

            // --- VICTORY CUTSCENE ---
            if (isLevelComplete) {
                if (victoryPhase === 1) {
                    victoryTimer++; 
                    const SUCK_DURATION = 90;
                    
                    players.forEach(p => {
                        if (victoryTimer <= SUCK_DURATION) {
                            p.vx = 0; p.vy = 0;
                            p.x += (goal.visualX + TILE_SIZE/2 - p.width/2 - p.x) * 0.1; 
                            p.y += (goal.visualY + TILE_SIZE/2 - p.height/2 - p.y) * 0.1;
                            p.targetRotation += 0.2; p.rotation = p.targetRotation; 
                            p.scale = 1;
                            p.hardLandTimer = 0; p.runStretchX = 0; p.idleBlend = 0; p.lean = 0; p.touchingWall = 0;
                            if (p.trail.length > 0) p.trail.pop(); // Smoothly fade out the frozen trail!
                            if (victoryTimer % 5 === 0) particles.push(createParticle(p.x + p.width/2, p.y + p.height/2, p.skin.color, 0.5));
                        } else {
                            p.scale = 0; 
                            p.trail = []; // Ensure it's completely cleared
                        }
                    });

                    if (victoryTimer === SUCK_DURATION) {
                        sfxCollect(); 
                        for(let i=0; i<30; i++) particles.push(createParticle(goal.visualX + TILE_SIZE/2, goal.visualY + TILE_SIZE/2, currentTheme.goal, 2.5));
                        players.forEach(p => {
                            for(let i=0; i<15; i++) particles.push(createParticle(goal.visualX + TILE_SIZE/2, goal.visualY + TILE_SIZE/2, p.skin.color, 1.5));
                        });
                    }

                    let targetZoom = BASE_ZOOM;

                    currentZoom += (targetZoom - currentZoom) * 0.05;
                    cameraX += (goal.visualX + TILE_SIZE/2 - canvas.width / (2 * currentZoom) - cameraX) * 0.05;
                    cameraY += (goal.visualY + TILE_SIZE/2 - canvas.height / (2 * currentZoom) - cameraY) * 0.05;
                    
                    cameraX = Math.max(0, Math.min(cameraX, Math.max(0, COLS * TILE_SIZE - canvas.width / currentZoom))); 
                    cameraY = Math.max(0, Math.min(cameraY, Math.max(0, ROWS * TILE_SIZE + 1000 - canvas.height / currentZoom)));

                    if (victoryTimer >= VICTORY_DURATION) showLevelCompleteUI();
                } else if (victoryPhase === 2 && isGameBeaten) danceTimer++;
                return;
            }

            let t = Date.now() / 1000;
            movers.forEach(m => {
                let prevX = m.x; let prevY = m.y;
                if (m.type === 'M') m.x = m.startX + Math.sin(t * m.speed) * m.dist;
                if (m.type === 'V') m.y = m.startY + Math.sin(t * m.speed) * m.dist;
                m.dx = m.x - prevX; m.dy = m.y - prevY;
            });

            crumblers.forEach(c => {
                if (!c.active) {
                    if (c.respawnTimer > 0) {
                        c.respawnTimer--;
                        if (c.respawnTimer <= 0) {
                            c.active = true;
                            c.crumbling = false;
                            createDeathParticles(c.x + TILE_SIZE/2, c.y + TILE_SIZE/2, currentTheme.platTop);
                        }
                    }
                    return;
                }
                if (c.crumbling) { 
                    c.timer--; 
                    if (c.timer <= 0) { 
                        c.active = false; 
                        c.respawnTimer = 300; 
                        createDeathParticles(c.x + TILE_SIZE/2, c.y + TILE_SIZE/2, currentTheme.platTop); 
                    } 
                }
            });

            let activeCollectibles = collectibles.filter(c => c.active);
            let activeCrumblers = crumblers.filter(c => c.active);
            let solidBlocks = [...platforms, ...bouncers, ...movers, ...activeCrumblers];

            players.forEach(p => {
                if (!p.isActive) return;

                p.blinkTimer--;
                if (p.blinkTimer < -5) p.blinkTimer = Math.random() * 120 + 60;
                if (p.hardLandTimer > 0) p.hardLandTimer--;

                // Freeze player if waiting at the goal in COOP mode
                let isWaiting = gameMode === 'COOP' && p.atGoal && !isLevelComplete;
                if (isWaiting) {
                    keys[p.controls.up] = false; // Block jumping so they don't accidentally leave the portal
                    // We NO LONGER clear left/right keys. This allows them to run in place and change directions!
                    p.x += (goal.visualX + TILE_SIZE/2 - p.width/2 - p.x) * 0.15; // Gently magnetically pull to center
                }

                if (p.isGrounded) { p.coyoteFrames = p.maxCoyoteFrames; p.jumpsLeft = p.maxJumps; } else p.coyoteFrames--;
                if (keys[p.controls.up]) { if (!p.jumpInputWasPressed) { p.jumpBuffer = p.maxJumpBuffer; p.jumpInputWasPressed = true; } } else p.jumpInputWasPressed = false;

                let platDx = (p.isGrounded && p.standingOn && p.standingOn.dx !== undefined) ? p.standingOn.dx : 0;
                let platDy = (p.isGrounded && p.standingOn && p.standingOn.dy !== undefined) ? p.standingOn.dy : 0;
                p.y += platDy; 

                if (keys[p.controls.left]) { p.vx -= p.accel; p.facingRight = false; }
                else if (keys[p.controls.right]) { p.vx += p.accel; p.facingRight = true; }
                
                p.vx *= p.friction; if (p.vx > p.maxSpeed) p.vx = p.maxSpeed; if (p.vx < -p.maxSpeed) p.vx = -p.maxSpeed; if (Math.abs(p.vx) < 0.1) p.vx = 0;

                let moveX = p.vx + platDx;
                if (isWaiting) moveX = 0; // Lock horizontal movement so they stay safely in the portal
                p.x += moveX; p.touchingWall = 0;
                let testBoxX = { x: p.x, y: p.y + 1, width: p.width, height: p.height - 2 };
                for (let block of solidBlocks) {
                    if (AABB(testBoxX, block)) {
                        if (moveX > 0) { p.x = block.x - p.width; p.vx = 0; p.touchingWall = 1; }
                        else if (moveX < 0) { p.x = block.x + block.width; p.vx = 0; p.touchingWall = -1; }
                    }
                }

                p.vy += p.gravity; if (p.vy > 12) p.vy = 12; 
                
                if (p.touchingWall !== 0 && p.vy > 0 && !p.isGrounded) {
                    let pushingWall = (keys[p.controls.right] && p.touchingWall === 1) || (keys[p.controls.left] && p.touchingWall === -1);
                    if (pushingWall) { 
                        p.vy *= 0.6; 
                        if (Math.random() > 0.6) {
                            particles.push({
                                x: p.touchingWall === 1 ? p.x + p.width : p.x, 
                                y: p.y + p.height - Math.random() * 10,
                                vx: -p.touchingWall * (Math.random() * 2), vy: -Math.random() * 2,
                                life: 0.8, decay: 0.05, color: '#888899', size: currentStyle === 'RETRO' ? PIXEL : 4
                            });
                        }
                    }
                }

                if (p.jumpBuffer > 0) {
                    if (p.coyoteFrames > 0 || p.jumpsLeft > 0) {
                        p.vy = p.jumpPower; p.jumpBuffer = 0; p.coyoteFrames = 0; p.isGrounded = false; p.jumpsLeft--; p.standingOn = null;
                        p.targetRotation += Math.PI * 2 * (p.facingRight ? 1 : -1); 
                        sfxJump(); createDustParticles(p.x + p.width/2, p.y + p.height);
                    } else if (p.touchingWall !== 0 && !p.isGrounded) {
                        p.vy = p.jumpPower; p.vx = -p.touchingWall * p.maxSpeed * 1.5; p.jumpBuffer = 0; p.jumpsLeft = 1; p.facingRight = (p.touchingWall === -1);
                        p.targetRotation += Math.PI * 2 * (p.facingRight ? 1 : -1); 
                        sfxJump(); createDustParticles(p.touchingWall === 1 ? p.x + p.width : p.x, p.y + p.height);
                    }
                    p.jumpBuffer--;
                }

                p.y += p.vy; p.isGrounded = false; p.standingOn = null;
                let testBoxY = { x: p.x + 1, y: p.y, width: p.width - 2, height: p.height };
                for (let block of solidBlocks) {
                    if (AABB(testBoxY, block)) {
                        if (p.vy > 0) { 
                            p.y = block.y - p.height; p.vy = 0; p.isGrounded = true; p.standingOn = block;
                            if (bouncers.includes(block)) { 
                                p.vy = p.jumpPower * 1.5; p.isGrounded = false; p.jumpsLeft = p.maxJumps; 
                                p.targetRotation += Math.PI * 2 * (p.facingRight ? 1 : -1); 
                                sfxBounce(); p.standingOn = null; 
                            }
                            if (crumblers.includes(block) && !block.crumbling) { block.crumbling = true; block.timer = 20; }
                        }
                        else if (p.vy < 0) { p.y = block.y + block.height; p.vy = 0; }
                    }
                }

                if (p.isGrounded && !p.lastGrounded) {
                    createDustParticles(p.x + p.width/2, p.y + p.height);
                    p.rotation = Math.round(p.rotation / (Math.PI*2)) * (Math.PI*2);
                    p.targetRotation = p.rotation;
                    p.hardLandTimer = 10;
                }
                
                p.lastGrounded = p.isGrounded; 
                if (!p.isGrounded) p.rotation += (p.targetRotation - p.rotation) * 0.15; 

                let targetLean = p.isGrounded ? (p.vx / p.maxSpeed) * 0.35 : 0; p.lean += (targetLean - p.lean) * 0.2;
                let targetRunStretch = p.isGrounded ? Math.abs(p.vx) * 0.7 : 0; p.runStretchX += (targetRunStretch - p.runStretchX) * 0.25;
                if (p.isGrounded && Math.abs(p.vx) < 0.1 && keys[p.controls.left] === false && keys[p.controls.right] === false && gameState === 'PLAYING') p.idleBlend += (1 - p.idleBlend) * 0.05; else p.idleBlend += (0 - p.idleBlend) * 0.2;

                if (!isWaiting && (Math.abs(p.vx) > 1 || Math.abs(p.vy) > 1)) p.trail.unshift({ x: p.x, y: p.y, rotation: p.rotation, lean: p.lean, frame: 0 }); else if (p.trail.length > 0) p.trail.pop();
                if (p.trail.length > 5) p.trail.pop(); for(let t of p.trail) t.frame++;

                let died = false;
                for (let spike of hazards) { let hHitbox = { x: spike.x + 4, y: spike.y + 4, width: spike.width - 8, height: spike.height - 4 }; if (AABB(p, hHitbox)) { die(p); died = true; break; } }
                if (!died && p.y > ROWS * TILE_SIZE + 100) { die(p); died = true; }

                activeCollectibles.forEach(c => {
                    if (AABB(p, c)) { 
                        c.active = false; sfxCollect(); 
                        for(let i=0; i<10; i++) particles.push(createParticle(c.x + c.width/2, c.y + c.height/2, '#fff', 0.5));
                        updateScoreUI();
                        if (collectibles.filter(col => col.active).length === 0) sfxUnlock(); 
                    }
                });

                p.atGoal = (!died && goalActive && goal && AABB(p, goal));
            });

            if (!isLevelComplete && goalActive && goal && players.length > 0) {
                let playersAtGoal = players.filter(p => p.atGoal);
                if (gameMode === 'COOP') {
                    if (playersAtGoal.length === players.length) completeLevel('COOP');
                } else {
                    if (playersAtGoal.length > 0) completeLevel(playersAtGoal[0].id);
                }
            }

            if (players.length > 0 && !isLevelComplete) {
                let targetZoom = BASE_ZOOM;
                if (isTwoPlayer && players.length > 1) {
                    let minX = Math.min(...players.map(p => p.x)); let maxX = Math.max(...players.map(p => p.x));
                    let minY = Math.min(...players.map(p => p.y)); let maxY = Math.max(...players.map(p => p.y));
                    let distX = Math.max(200, maxX - minX + 350); let distY = Math.max(150, maxY - minY + 300);
                    targetZoom = Math.max(0.4, Math.min(BASE_ZOOM, canvas.width / distX, canvas.height / distY)); 
                }

                currentZoom += (targetZoom - currentZoom) * 0.05;
                let midX = players.reduce((sum, p) => sum + p.x, 0) / players.length; let midY = players.reduce((sum, p) => sum + p.y, 0) / players.length;
                cameraX += (midX - canvas.width / (2 * currentZoom) - cameraX) * 0.1; cameraY += (midY - canvas.height / (2 * currentZoom) - cameraY) * 0.1;
                cameraX = Math.max(0, Math.min(cameraX, Math.max(0, COLS * TILE_SIZE - canvas.width / currentZoom)));
                cameraY = Math.max(0, Math.min(cameraY, Math.max(0, ROWS * TILE_SIZE + 1000 - canvas.height / currentZoom)));
            }
        }

        // --- DRAWING UTILS ---
        function drawRect(x, y, w, h) { ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h)); }

        function drawBeams(ctx, theme) {
            const time = Date.now() / 1000;
            ctx.save();
            ctx.globalAlpha = 0.05;
            ctx.fillStyle = theme.goal;
            for(let i=0; i<6; i++) {
                let angle = Math.sin(time*0.2 + i) * 0.3;
                ctx.translate(i * 500, -500);
                ctx.rotate(angle);
                ctx.fillRect(0, 0, 80 + Math.sin(time+i)*40, 3000);
                ctx.rotate(-angle);
                ctx.translate(-i * 500, 500);
            }
            ctx.restore();
        }

        function drawIntroEffects(ctx, isRetro) {
            if (introType === 'BEAM' && introTimer < 60) {
                ctx.save();
                let beamWidth = 0;
                if (introTimer < 15) beamWidth = (introTimer / 15) * 32;
                else if (introTimer < 45) beamWidth = 32;
                else if (introTimer < 60) beamWidth = (1 - (introTimer - 45) / 15) * 32;
                
                if (beamWidth > 0) {
                    ctx.fillStyle = currentTheme.goal;
                    ctx.globalAlpha = isRetro ? 0.8 : (0.6 + Math.sin(Date.now() / 50) * 0.2);
                    if (!isRetro) { ctx.shadowBlur = 20; ctx.shadowColor = currentTheme.goal; }
                    
                    players.forEach(p => {
                        let topY = cameraY - 200;
                        let bottomY = p.startY + p.height;
                        let bx = p.x + p.width/2;
                        ctx.fillRect(bx - beamWidth/2, topY, beamWidth, bottomY - topY);
                        
                        if (isRetro) {
                            ctx.fillStyle = '#fff';
                            ctx.fillRect(bx - beamWidth/4, topY, beamWidth/2, bottomY - topY);
                            ctx.fillStyle = currentTheme.goal;
                        }
                    });
                }
                ctx.restore();
            } else if ((introType === 'LOOK' || introType === 'STARE') && introTimer < 160) {
                ctx.save();
                ctx.textAlign = 'center';
                if (!isRetro) { ctx.shadowBlur = 10; ctx.shadowColor = currentTheme.goal; }

                let floatY = Math.sin(Date.now() / 100) * 5;
                
                let midX = players.reduce((sum, p) => sum + p.x + p.width/2, 0) / players.length;
                let midY = players.reduce((sum, p) => sum + p.y, 0) / players.length - 25 + floatY;

                if (introTimer < 100) {
                    ctx.fillStyle = '#fff';
                    ctx.font = isRetro ? '10px "Press Start 2P"' : '900 20px "Orbitron"';
                    ctx.globalAlpha = Math.min(1, introTimer / 10);
                    ctx.fillText("READY?", midX, midY);
                } else {
                    ctx.fillStyle = currentTheme.goal;
                    ctx.font = isRetro ? '14px "Press Start 2P"' : '900 28px "Orbitron"';
                    ctx.globalAlpha = Math.max(0, 1 - (introTimer - 100) / 60);
                    ctx.fillText("GO!", midX, midY - (introTimer - 100) * 0.5);
                }
                ctx.restore();
            }
        }

        function drawParallaxBG(ctx, theme, camX, camY) {
